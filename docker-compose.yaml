services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080

  frontend:
    build:
      context: ./frontend/react-app
    ports:
      - "3000:80"   # Nginx serves on 80, mapped to host 3000
    depends_on:
      - backend
    env_file:
      - ./frontend/react-app/.env.docker